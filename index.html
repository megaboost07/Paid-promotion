<!DOCTYPE html>
<html lang="hi">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>KAPIL 1992 STORE</title>
    <style>
        :root {
            --primary: #ff4757;
            --dark: #2f3542;
            --bg: #f1f2f6;
        }

        /* PC par bhi phone jaisa dikhne ke liye main container */
        body {
            margin: 0;
            padding: 0;
            background: #2f3542; /* PC background */
            display: flex;
            justify-content: center;
            font-family: 'Segoe UI', sans-serif;
        }

        .mobile-container {
            width: 100%;
            max-width: 450px; /* PC par width fix kar di gayi hai */
            height: 100vh;
            background: var(--bg);
            position: relative;
            overflow-y: auto;
            box-shadow: 0 0 20px rgba(0,0,0,0.5);
        }

        /* Header */
        header {
            background: var(--primary);
            color: white;
            padding: 20px;
            text-align: center;
            border-bottom-left-radius: 25px;
            border-bottom-right-radius: 25px;
            position: sticky;
            top: 0;
            z-index: 10;
        }

        .page { display: none; padding: 15px; padding-bottom: 100px; }
        .active { display: block; }

        /* Home Page - Menu Items */
        .search-bar {
            width: 100%;
            padding: 12px;
            border-radius: 10px;
            border: none;
            margin-bottom: 15px;
            box-sizing: border-box;
            box-shadow: 0 2px 5px rgba(0,0,0,0.1);
        }

        .food-list {
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 10px;
        }

        .food-card {
            background: white;
            padding: 10px;
            border-radius: 15px;
            text-align: center;
            box-shadow: 0 2px 8px rgba(0,0,0,0.05);
        }

        .food-card img {
            width: 100%;
            height: 100px;
            object-fit: cover;
            border-radius: 10px;
        }

        /* Calculator UI - Vertical Phone Style */
        .calc-box {
            background: #000;
            border-radius: 20px;
            padding: 15px;
            margin-top: 10px;
        }

        .calc-display {
            color: white;
            font-size: 35px;
            text-align: right;
            padding: 20px;
            height: 50px;
            overflow: hidden;
        }

        .calc-btns {
            display: grid;
            grid-template-columns: repeat(4, 1fr);
            gap: 10px;
        }

        .c-btn {
            height: 60px;
            border-radius: 50%;
            border: none;
            font-size: 20px;
            font-weight: bold;
            cursor: pointer;
        }

        .c-num { background: #333; color: white; }
        .c-op { background: #f39c12; color: white; }
        .c-ac { background: #a5a5a5; }

        /* Upload Form */
        .input-box {
            width: 100%;
            padding: 15px;
            margin: 10px 0;
            border-radius: 10px;
            border: 1px solid #ddd;
            box-sizing: border-box;
        }

        .btn-upload {
            background: var(--primary);
            color: white;
            border: none;
            width: 100%;
            padding: 15px;
            border-radius: 10px;
            font-weight: bold;
            margin-top: 10px;
        }

        /* Bottom Nav - Fixed at bottom of container */
        .nav {
            position: absolute;
            bottom: 0;
            width: 100%;
            height: 70px;
            background: white;
            display: flex;
            border-top: 1px solid #ddd;
        }

        .nav-item {
            flex: 1;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            font-size: 12px;
            color: #777;
            cursor: pointer;
        }

        .nav-item.active-nav { color: var(--primary); font-weight: bold; }

    </style>
</head>
<body>

<div class="mobile-container">
    <header>
        <h2 style="margin:0;">KAPIL 1992 STORE</h2>
        <small>OFFLINE FOOD SHOP</small>
    </header>

    <div id="homePage" class="page active">
        <input type="text" id="search" class="search-bar" placeholder="Search food..." onkeyup="showFood()">
        <div id="foodGrid" class="food-list"></div>
    </div>

    <div id="uploadPage" class="page">
        <div style="background:white; padding:15px; border-radius:15px;">
            <h3>Upload Food</h3>
            <input type="hidden" id="editIdx">
            <input type="text" id="name" class="input-box" placeholder="Food Name">
            <input type="number" id="price" class="input-box" placeholder="Price ₹">
            <input type="file" id="image" class="input-box" accept="image/*">
            <button class="btn-upload" onclick="save()">Save To Store</button>
        </div>
    </div>

    <div id="calcPage" class="page">
        <div class="calc-box">
            <div id="res" class="calc-display">0</div>
            <div class="calc-btns">
                <button class="c-btn c-ac" onclick="clr()">AC</button>
                <button class="c-btn c-ac" onclick="back()">DEL</button>
                <button class="c-btn c-op" onclick="val('/')">÷</button>
                <button class="c-btn c-op" onclick="val('*')">×</button>
                
                <button class="c-btn c-num" onclick="val('7')">7</button>
                <button class="c-btn c-num" onclick="val('8')">8</button>
                <button class="c-btn c-num" onclick="val('9')">9</button>
                <button class="c-btn c-op" onclick="val('-')">-</button>
                
                <button class="c-btn c-num" onclick="val('4')">4</button>
                <button class="c-btn c-num" onclick="val('5')">5</button>
                <button class="c-btn c-num" onclick="val('6')">6</button>
                <button class="c-btn c-op" onclick="val('+')">+</button>
                
                <button class="c-btn c-num" onclick="val('1')">1</button>
                <button class="c-btn c-num" onclick="val('2')">2</button>
                <button class="c-btn c-num" onclick="val('3')">3</button>
                <button class="c-btn c-op" style="background:#2ecc71" onclick="eq()">=</button>
                
                <button class="c-btn c-num" style="grid-column: span 2; border-radius:30px;" onclick="val('0')">0</button>
                <button class="c-btn c-num" onclick="val('.')">.</button>
            </div>
        </div>
    </div>

    <div class="nav">
        <div class="nav-item active-nav" onclick="tab('homePage', this)"><span>🏠</span>Home</div>
        <div class="nav-item" onclick="tab('uploadPage', this)"><span>➕</span>Upload</div>
        <div class="nav-item" onclick="tab('calcPage', this)"><span>🔢</span>Calculator</div>
    </div>
</div>

<script>
    let store = JSON.parse(localStorage.getItem('kapilStore')) || [];

    function tab(id, el) {
        document.querySelectorAll('.page').forEach(p => p.classList.remove('active'));
        document.querySelectorAll('.nav-item').forEach(n => n.classList.remove('active-nav'));
        document.getElementById(id).classList.add('active');
        el.classList.add('active-nav');
        if(id === 'homePage') showFood();
    }

    function save() {
        const n = document.getElementById('name').value;
        const p = document.getElementById('price').value;
        const i = document.getElementById('image').files[0];
        const idx = document.getElementById('editIdx').value;

        if(!n || !p) return alert("Fill details");

        if(i) {
            const r = new FileReader();
            r.onload = (e) => finishSave(n, p, e.target.result, idx);
            r.readAsDataURL(i);
        } else {
            const old = idx !== "" ? store[idx].img : 'https://via.placeholder.com/100';
            finishSave(n, p, old, idx);
        }
    }

    function finishSave(n, p, img, idx) {
        const item = {n, p, img};
        if(idx === "") store.push(item);
        else { store[idx] = item; document.getElementById('editIdx').value = ""; }
        
        localStorage.setItem('kapilStore', JSON.stringify(store));
        alert("Success!");
        location.reload();
    }

    function showFood() {
        const grid = document.getElementById('foodGrid');
        const q = document.getElementById('search').value.toLowerCase();
        grid.innerHTML = "";
        store.forEach((it, i) => {
            if(it.n.toLowerCase().includes(q)) {
                grid.innerHTML += `
                <div class="food-card">
                    <img src="${it.img}">
                    <h4>${it.n}</h4>
                    <div style="color:green; font-weight:bold">₹${it.p}</div>
                    <button onclick="edit(${i})" style="border:none; background:#f1c40f; padding:5px; border-radius:5px; margin-top:5px; width:45%">Edit</button>
                    <button onclick="del(${i})" style="border:none; background:#e74c3c; color:white; padding:5px; border-radius:5px; margin-top:5px; width:45%">Del</button>
                </div>`;
            }
        });
    }

    function del(i) {
        if(confirm("Delete?")) { store.splice(i,1); localStorage.setItem('kapilStore', JSON.stringify(store)); showFood(); }
    }

    function edit(i) {
        const it = store[i];
        document.getElementById('name').value = it.n;
        document.getElementById('price').value = it.p;
        document.getElementById('editIdx').value = i;
        tab('uploadPage', document.querySelectorAll('.nav-item')[1]);
    }

    // Calc Logic
    let txt = "0";
    function val(v) { if(txt==="0")txt=""; txt+=v; document.getElementById('res').innerText = txt; }
    function clr() { txt="0"; document.getElementById('res').innerText = txt; }
    function back() { txt = txt.slice(0,-1) || "0"; document.getElementById('res').innerText = txt; }
    function eq() { try { txt=eval(txt).toString(); document.getElementById('res').innerText = txt; } catch { alert("Error"); txt="0"; } }

    showFood();
</script>
</body>
</html>
